name: iverilog-v1

on:
  push:
  pull_request:

jobs:
  sim-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Run v1 simulation
        run: make v1
